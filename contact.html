<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jawad & Shabhistha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="jaaz logo (3).png">
    
    <style>
        .playfair { font-family: 'Playfair Display', serif; }
        .montserrat { font-family: 'Montserrat', sans-serif; }
        
        /* Glassmorphism for Contact Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 360px;
        }

        /* Selection Overlay (The Blur Background) */
        #selection-overlay {
            position: fixed; inset: 0;
            background: rgba(217, 233, 242, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }

        /* THE POPUP BOX - All branding is inside here */
        .choice-card {
            background: white;
            padding: 3.5rem 2.5rem;
            border-radius: 3.5rem;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .side-btn {
            width: 100%; padding: 1.1rem; margin: 0.5rem 0;
            border-radius: 1.2rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.15em; transition: all 0.3s ease;
        }
        .btn-groom { background: #164e63; color: white; }
        .btn-bride { background: #f9a8d4; color: white; }
        .side-btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        /* FIXED FLOWER SHOWER */
        .flower-container { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 10; }
        .petal { 
            position: absolute; background-color: #ffb7c5; border-radius: 150% 0 150% 0; 
            opacity: 0; animation: shower 10s linear infinite; 
        }
        @keyframes shower {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
        }
    </style>
</head>
<body class="montserrat text-stone-700 min-h-screen relative bg-[#d9e9f2]">

    <div id="petal-container" class="flower-container"></div>

    <div id="selection-overlay">
        <div class="choice-card">
            <img src="jaaz logo (3).png" class="w-20 h-20 mx-auto mb-6 object-contain" alt="JAAZ Logo">
            
            <div class="flex items-center justify-center gap-4 mb-6">
                <div class="h-[1px] w-16 bg-stone-100"></div>
                <span class="text-stone-300 text-xs">✨</span>
                <div class="h-[1px] w-16 bg-stone-100"></div>
            </div>

            <h1 class="playfair text-3xl md:text-4xl font-bold text-stone-800 leading-tight">Jawad & Shabhistha</h1>
            
            <p class="playfair italic text-xl text-stone-500 mt-2 mb-8">Welcome</p>
            
            <p class="text-stone-400 text-[10px] uppercase tracking-[0.3em] mb-8">Choose your side to see contacts</p>
            
            <div class="space-y-4">
                <button onclick="showContacts('groom')" class="side-btn btn-groom text-[10px]">Bridegroom Side (Dulha)</button>
                <button onclick="showContacts('bride')" class="side-btn btn-bride text-[10px]">Bride Side (Dulhan)</button>
            </div>
        </div>
    </div>
    <nav class="flex justify-center space-x-8 py-6 text-xs uppercase tracking-widest font-medium relative z-50">
         <a href="our-story.html" class="hover:text-rose-400">OUR STORY</a>
        <a href="index.html" class="hover:text-rose-400">EVENT</a>
        <a href="location.html" class="hover:text-rose-400">Location</a>
        <a href="contact.html" class="border-b-2 border-stone-800 pb-1">Contact</a>
        <a href="#" class="border-b-2 border-stone-800 pb-1">GALLERY</a>
        
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 relative z-20">
        <div class="text-center mb-16">
            <h1 class="playfair text-5xl md:text-7xl italic font-semibold text-stone-800">Jawad & Shabhistha</h1>
            <h2 id="contact-heading" class="mt-4 playfair text-2xl md:text-3xl italic text-stone-600">Family Contacts</h2>
            <p class="mt-2 text-stone-400 italic uppercase tracking-[0.3em] text-[10px]">Tap a number to initiate call</p>
        </div>

        <div id="contact-grid" class="flex flex-wrap justify-center gap-8">
            </div>

        <div class="text-center mt-20">
            <button onclick="location.reload()" class="text-[10px] uppercase tracking-widest font-bold text-stone-400 hover:text-stone-800 transition">Change Side Selection</button>
        </div>
    </main>

    <script>
        const groomContacts = [
            { name: "Shaik Ali", relation: "Father", phone: "+91 8500345430", img: "images/Shaik Ali.jpeg" },
            { name: "Shaik Jawad Ali", relation: "BrideGroom🤵", phone: "+91 9347533131", img: "images/Shaik Jawad Ali.jpeg" },
            { name: "Shaik Tauseef Ali", relation: "Brother", phone: "+91 9550791538", img: "images/Shaik Tauseef Ali.png" },
            { name: "Shaik Ahmad", relation: "Chachu", phone: "+91 9000641355", img: "images/Shaik Ahmad.jpeg" },
            { name: "Shaik Saleem", relation: "Chachu", phone: "+91 9493189287", img: "images/Shaik Saleem.jpeg" },
            { name: "Shaik Asif", relation: "Chachu", phone: "+91 8790108998", img: "images/Shaik Asif.jpeg" },
            { name: "Shaik Minhaj Ali", relation: "Brother", phone: "+91 7075076001", img: "images/Shaik Minhaj Ali.jpeg" }
        ];

        const brideContacts = [
            { name: "Mohmmad Muqtar", relation: "Father", phone: "+91 9949074926", img: "images/Mohmmad Muqtar.jpeg" },
            { name: "Mohmmad Zubair", relation: "Brother", phone: "+91 7671840025", img: "images/Mohmmad Zubair.jpeg" },
            { name: "Mohmmad Anas", relation: "Brother", phone: "+91 6301397537", img: "images/Mohmmad Anas.jpeg" }
        ];

        function showContacts(side) {
            document.getElementById('selection-overlay').style.display = 'none';
            const grid = document.getElementById('contact-grid');
            const heading = document.getElementById('contact-heading');
            grid.innerHTML = '';
            const data = (side === 'groom') ? groomContacts : brideContacts;
            heading.innerText = (side === 'groom') ? "Bridegroom's Family Contacts" : "Bride's Family Contacts";

            data.forEach(person => {
                grid.innerHTML += `
                    <div class="glass-card p-10 text-center flex flex-col items-center">
                        <div class="w-48 h-60 rounded-t-[4rem] rounded-b-[1rem] overflow-hidden mb-8 border-4 border-white shadow-inner">
                            <img src="${person.img}" alt="${person.name}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Profile'">
                        </div>
                        <h3 class="playfair text-2xl md:text-3xl font-bold text-stone-800 whitespace-nowrap">${person.name}</h3>
                        <p class="text-rose-400 text-xs uppercase tracking-[0.2em] font-bold mt-1.5">${person.relation}</p>
                        <div class="h-px w-16 bg-stone-200 my-5"></div>
                        <a href="tel:${person.phone}" class="text-lg text-stone-600 font-semibold hover:text-stone-900 transition flex items-center gap-1.5">
                            📞 ${person.phone}
                        </a>
                    </div>`;
            });
        }

        // Flower Shower Initialization
        const petalContainer = document.getElementById('petal-container');
        for (let i = 0; i < 75; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + '%';
            petal.style.animationDelay = Math.random() * 10 + 's';
            petal.style.animationDuration = (6 + Math.random() * 10) + 's';
            const size = (10 + Math.random() * 15) + 'px';
            petal.style.width = size; petal.style.height = size;
            petalContainer.appendChild(petal);
        }
    </script>
</body>
</html>
