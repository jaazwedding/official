<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jawad & Shabistha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="jaaz logo (3).png">
    
    <style>
        .playfair { font-family: 'Playfair Display', serif; }
        .montserrat { font-family: 'Montserrat', sans-serif; }
        
        /* Royal Background */
        body { background-color: #2d241e; margin: 0; padding: 0; overflow: hidden; }

        /* --- FIXED SCROLL FRAME (Matches Index) --- */
        #main-page-wrapper {
            position: fixed;
            inset: 15px; 
            background-color: #fdfbf7;
            background-image: 
                linear-gradient(to right, rgba(184, 134, 11, 0.08) 0%, transparent 10%, transparent 90%, rgba(184, 134, 11, 0.08) 100%),
                url("https://www.transparenttextures.com/patterns/parchment.png");
            border-radius: 3.5rem; 
            border: 3px solid #d4af37;
            box-shadow: 0 0 100px rgba(0,0,0,0.8), inset 0 0 40px rgba(184, 134, 11, 0.1);
            z-index: 40;
            overflow: hidden;
        }

        #scroll-content {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 100px;
        }
        #scroll-content::-webkit-scrollbar { width: 0px; }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(to bottom, #fdfbf7 85%, transparent);
            padding-top: 40px;
            padding-bottom: 20px;
        }

        /* --- CONTACT CARDS --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 2.5rem;
            transition: all 0.4s ease;
            width: 100%;
            max-width: 320px;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            background: white;
            border-color: #d4af37;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }

        /* Selection Overlay Styled like Royal Card */
        #selection-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 500;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .choice-card {
            background: #fdfbf7;
            background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
            padding: 3rem 2rem;
            border-radius: 3rem;
            text-align: center;
            border: 2px solid #d4af37;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }

        .side-btn {
            width: 100%; padding: 1rem; margin: 0.5rem 0;
            border-radius: 3rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.15em; transition: all 0.3s ease;
            font-size: 10px;
        }
        .btn-groom { background: #1c1917; color: #d4af37; border: 1px solid #d4af37; }
        .btn-bride { background: #fdf2f8; color: #be185d; border: 1px solid #f9a8d4; }

        /* Petals */
        #petal-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 60; overflow: hidden;
        }
        .petal {
            position: absolute; background-color: #ffb7c5; border-radius: 150% 0 150% 0;
            opacity: 0; will-change: transform;
        }
        @keyframes shower {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="montserrat">

    <div id="petal-container"></div>

    <div id="selection-overlay">
        <div class="choice-card">
            <img src="jaaz logo (3).png" class="w-24 h-24 mx-auto mb-4 object-contain" alt="Logo">
            <h1 class="playfair text-xl md:text-4xl font-bold text-stone-800 leading-tight px-2 whitespace-nowrap">
    Jawad & Shabistha
            </h1>
              <h2 class="playfair text-xl md:text-3xl italic text-stone-600 mt-2">Welcome</h2>
            <p class="text-stone-500 text-[9px] uppercase font-bold tracking-[0.2em] mt-2 mb-8">Choose a side to see contacts</p>
            <div class="space-y-3">
                <button onclick="showContacts('groom')" class="side-btn btn-groom">Bridegroom Side (Dulha)</button>
                <button onclick="showContacts('bride')" class="side-btn btn-bride">Bride Side (Dulhan)</button>
            </div>
            <a href="index.html" class="inline-block mt-8 text-[9px] uppercase font-bold text-stone-400 hover:text-stone-800">← Back to Home</a>
        </div>
    </div>

    <div id="main-page-wrapper">
        <div id="scroll-content">
            
            <div class="sticky-header text-center">
                <nav class="flex justify-center gap-6 text-[10px] font-bold uppercase tracking-widest border-b border-stone-100 pb-4 max-w-xs mx-auto">
                    <a href="index.html" class="hover:text-[#d4af37]">Event</a>
                    <a href="location.html" class="hover:text-[#d4af37]">Location</a>
                    <a href="contact.html" class="text-[#d4af37] border-b border-[#d4af37]">Contact</a>
                    <a href="gallery.html" class="hover:text-[#d4af37]">Gallery</a>

                </nav>
            </div>

            <main class="max-w-6xl mx-auto px-6 pt-10 text-center">
                <h1 class="playfair text-4xl md:text-6xl italic font-semibold text-stone-800">Family Contacts</h1>
                <p id="contact-heading" class="mt-2 text-rose-400 font-bold uppercase tracking-[0.2em] text-[10px]">Tap to call family members</p>

                <div id="contact-grid" class="flex flex-wrap justify-center gap-6 mt-12 mb-16">
                    </div>

                <div class="mb-20">
                    <button onclick="location.reload()" class="inline-block bg-stone-900 text-white px-10 py-4 rounded-full uppercase tracking-widest text-[9px] font-bold shadow-xl hover:bg-[#d4af37] transition-all">
                        Change Side Selection
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const groomContacts = [
            { name: "Shaik Ali", relation: "Father", phone: "+91 8500345430", img: "images/Shaik Ali.jpeg" },
            { name: "Shaik Jawad Ali", relation: "BrideGroom🤵", phone: "+91 9347533131", img: "images/Shaik Jawad Ali.jpeg" },
            { name: "Shaik Tauseef Ali", relation: "Brother", phone: "+91 9550791538", img: "images/Shaik Tauseef Ali.png" },
            { name: "Shaik Ahmad", relation: "Chachu", phone: "+91 9000641355", img: "images/Shaik Ahmad.jpeg" },
            { name: "Shaik Saleem", relation: "Chachu", phone: "+91 9493189287", img: "images/Shaik Saleem.jpeg" },
            { name: "Shaik Asif", relation: "Chachu", phone: "+91 8790108998", img: "images/Shaik Asif.jpeg" },
            { name: "Shaik Minhaj Ali", relation: "Brother", phone: "+91 7075076001", img: "images/Shaik Minhaj Ali.jpeg" }
        ];

        const brideContacts = [
            { name: "Mohmmad Muqtar", relation: "Father", phone: "+91 9949074926", img: "images/Mohmmad Muqtar.jpeg" },
            { name: "Mohmmad Zubair", relation: "Brother", phone: "+91 7671840025", img: "images/Mohmmad Zubair.jpeg" },
            { name: "Mohmmad Anas", relation: "Brother", phone: "+91 6301397537", img: "images/Mohmmad Anas.jpeg" }
        ];

        function showContacts(side) {
            document.getElementById('selection-overlay').style.display = 'none';
            const grid = document.getElementById('contact-grid');
            const heading = document.getElementById('contact-heading');
            grid.innerHTML = '';
            
            const data = (side === 'groom') ? groomContacts : brideContacts;
            heading.innerText = (side === 'groom') ? "Bridegroom's Family" : "Bride's Family";

            data.forEach(person => {
                grid.innerHTML += `
                    <div class="glass-card p-6 text-center flex flex-col items-center">
                        <div class="w-32 h-40 md:w-40 md:h-48 rounded-t-[3rem] rounded-b-[1rem] overflow-hidden mb-6 border-2 border-[#d4af37] shadow-lg">
                            <img src="${person.img}" alt="${person.name}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Profile'">
                        </div>
                        <h3 class="playfair text-xl font-bold text-stone-800">${person.name}</h3>
                        <p class="text-rose-400 text-[10px] uppercase tracking-widest font-bold mt-1">${person.relation}</p>
                        <div class="h-px w-10 bg-stone-200 my-4"></div>
                        <a href="tel:${person.phone}" class="text-xs text-stone-600 font-bold hover:text-[#d4af37] transition flex items-center gap-2">
                            📞 ${person.phone}
                        </a>
                    </div>`;
            });
            initPetals();
        }

        function initPetals() {
            const container = document.getElementById('petal-container');
            const petalCount = window.innerWidth < 768 ? 40 : 80;
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                const size = 8 + Math.random() * 10;
                petal.style.width = size + 'px';
                petal.style.height = size + 'px';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.backgroundColor = Math.random() > 0.5 ? '#fce4ec' : '#ffb7c5';
                petal.style.animation = `shower ${6 + Math.random() * 10}s linear infinite`;
                petal.style.animationDelay = `${Math.random() * 15}s`;
                container.appendChild(petal);
            }
        }
    </script>
</body>
</html>
