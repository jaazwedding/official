<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jawad & Shabhistha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="jaaz logo (3).png">
    
    <style>
        .playfair { font-family: 'Playfair Display', serif; }
        .montserrat { font-family: 'Montserrat', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2rem;
            transition: transform 0.3s ease;
        }

        /* Initial Popup Overlay */
        #selection-overlay {
            position: fixed;
            inset: 0;
            background: rgba(217, 233, 242, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-card {
            background: white;
            padding: 3rem;
            border-radius: 2.5rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        .side-btn {
            width: 100%;
            padding: 1.25rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn-groom { background: #164e63; color: white; }
        .btn-bride { background: #f9a8d4; color: white; }
        .side-btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* Flower Shower */
        .flower-container { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 5; }
        .petal { position: absolute; background-color: #ffb7c5; border-radius: 150% 0 150% 0; opacity: 0; animation: shower 10s linear infinite; }
        @keyframes shower {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="montserrat text-stone-700 min-h-screen relative bg-[#d9e9f2]">

    <div id="petal-container" class="flower-container"></div>

    <div id="selection-overlay">
        <div class="choice-card">
            <h2 class="playfair text-3xl italic font-bold text-stone-800 mb-2">Welcome!</h2>
            <p class="text-stone-500 text-sm mb-8">Please tell us which side you are from:</p>
            
            <button onclick="showContacts('groom')" class="side-btn btn-groom">Bridegroom (Dulha) Side</button>
            <button onclick="showContacts('bride')" class="side-btn btn-bride">Bride (Dulhan) Side</button>
        </div>
    </div>

    <nav class="flex justify-center space-x-8 py-6 text-xs uppercase tracking-widest font-medium relative z-50">
      <a href="our-story.html" class="hover:text-rose-400">OUR STORY</a>
        <a href="index.html" class="hover:text-rose-400">EVENT</a>
        <a href="location.html" class="hover:text-rose-400">LOCATION</a>
      <a href="#" class="hover:text-rose-400">GALLERY</a>
        <a href="#" class="border-b-2 border-stone-800 pb-1">CONTACT</a>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12 relative z-10">
        <div class="text-center mb-16">
            <h1 class="playfair text-5xl md:text-6xl italic font-semibold text-stone-800">Jawad & Shabhistha</h1>
            <h2 id="contact-heading" class="mt-4 playfair text-2xl italic text-stone-600">Emergency Contacts</h2>
        </div>

        <div id="contact-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>

        <div class="text-center mt-20">
            <button onclick="location.reload()" class="text-[10px] uppercase tracking-widest font-bold text-stone-400 hover:text-stone-800 transition">Change Side Selection</button>
        </div>
    </main>

    <script>
        // DATA OBJECTS (Add as many people as you want here)
        const groomContacts = [
            { name: "Shaik Tauseef Ali", relation: "Brother", phone: "+91 00000 00000", img: "images/tauseef.png" },
            { name: "Shaik Jawad Ali", relation: "Uncle", phone: "+91 00000 00000", img: "images/groom_fam2.png" },
            { name: "Family Member 3", relation: "Friend", phone: "+91 00000 00000", img: "images/groom_fam3.png" }
        ];

        const brideContacts = [
            { name: "Contact Person 1", relation: "Brother", phone: "+91 00000 00000", img: "images/bride_fam1.png" },
            { name: "Contact Person 2", relation: "Cousin", phone: "+91 00000 00000", img: "images/bride_fam2.png" },
            { name: "Contact Person 3", relation: "Uncle", phone: "+91 00000 00000", img: "images/bride_fam3.png" }
        ];

        function showContacts(side) {
            const overlay = document.getElementById('selection-overlay');
            const grid = document.getElementById('contact-grid');
            const heading = document.getElementById('contact-heading');
            
            overlay.style.display = 'none'; // Hide the popup
            grid.innerHTML = ''; // Clear existing
            
            const data = (side === 'groom') ? groomContacts : brideContacts;
            heading.innerText = (side === 'groom') ? "Bridegroom's Emergency Contacts" : "Bride's Emergency Contacts";

            data.forEach(person => {
                grid.innerHTML += `
                    <div class="glass-card p-8 text-center flex flex-col items-center">
                        <div class="w-32 h-32 rounded-full overflow-hidden mb-6 border-4 border-white shadow-md">
                            <img src="${person.img}" alt="${person.name}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                        </div>
                        <h3 class="playfair text-2xl font-bold text-stone-800">${person.name}</h3>
                        <p class="text-rose-400 text-xs uppercase tracking-widest font-bold mt-1">${person.relation}</p>
                        <div class="h-px w-12 bg-stone-200 my-4"></div>
                        <a href="tel:${person.phone}" class="text-stone-600 font-semibold hover:text-stone-900 transition">
                            📞 ${person.phone}
                        </a>
                    </div>
                `;
            });
        }

        // Flower Shower Logic
        const container = document.getElementById('petal-container');
        for (let i = 0; i < 60; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + '%';
            petal.style.animationDelay = Math.random() * 10 + 's';
            petal.style.animationDuration = (6 + Math.random() * 8) + 's';
            const size = (10 + Math.random() * 12) + 'px';
            petal.style.width = size; petal.style.height = size;
            container.appendChild(petal);
        }
    </script>
</body>
</html>
