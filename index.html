<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawad & Shabhistha's Wedding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .playfair { font-family: 'Playfair Display', serif; }
        .montserrat { font-family: 'Montserrat', sans-serif; }
        .card-shadow { box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-[#d9e9f2] montserrat text-stone-700">

    <nav class="flex justify-center space-x-6 md:space-x-12 py-6 text-xs md:text-sm uppercase tracking-widest font-medium">
        <a href="#" class="hover:text-rose-400">Our Story</a>
        <a href="#" class="border-b-2 border-stone-800 pb-1">Event</a>
        <a href="#" class="hover:text-rose-400">Location</a>
        <a href="#" class="hover:text-rose-400">Gallery</a>
        <a href="#" class="hover:text-rose-400">Contact</a>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        
        <div class="text-center mt-4">
            <h1 class="playfair text-4xl md:text-6xl italic font-semibold text-stone-800">Jawad & Shabhistha's</h1>
            <h2 class="playfair text-2xl md:text-3xl italic text-stone-700 mt-2">Wedding Invitation</h2>
        </div>

        <div class="relative flex justify-center items-center my-10 h-64 md:h-96">
            <img src="images/arch-left.png" class="absolute left-10 md:left-40 h-full opacity-60 pointer-events-none" alt="">
            <img src="images/couple-cartoon.png" class="relative z-10 h-full w-auto" alt="Couple">
            <img src="images/arch-right.png" class="absolute right-10 md:right-40 h-full opacity-60 scale-x-[-1] pointer-events-none" alt="">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            
            <div class="bg-white rounded-[2rem] p-8 text-center border border-stone-100 card-shadow">
                <h3 class="font-semibold text-lg mb-4">The Big Day</h3>
                <div id="countdown" class="text-5xl font-bold text-rose-300">00:00</div>
                <p class="text-xs text-stone-400 mt-1 uppercase tracking-tighter">Days : Hours</p>
                <div class="flex items-center justify-center mt-6 text-sm">
                    <span>📅 October 18, 2026</span>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] p-8 text-center border border-stone-100 card-shadow">
                <div class="text-4xl mb-3">🕌</div>
                <h3 class="font-semibold text-lg">Nikah Ceremony</h3>
                <p class="text-sm text-stone-500 mt-2">Timing: 11:30 AM</p>
            </div>

            <div class="bg-white rounded-[2rem] p-8 text-center border border-stone-100 card-shadow">
                <div class="text-4xl mb-3">🎂</div>
                <h3 class="font-semibold text-lg">Reception</h3>
                <p class="text-sm text-stone-500 mt-2">Timing: 7:00 PM onwards</p>
            </div>

            <div class="md:col-span-1 bg-white rounded-[2rem] overflow-hidden border border-stone-100 card-shadow">
                <div class="p-6">
                    <h3 class="font-semibold text-lg">The Venue</h3>
                    <p class="text-sm font-medium mt-2">The Emerald Garden</p>
                    <p class="text-xs text-stone-400">123 Wedding Street, City</p>
                </div>
                <a href="https://maps.google.com" target="_blank" class="block bg-stone-900 text-white text-center py-3 text-xs font-bold uppercase tracking-widest hover:bg-stone-700 transition">
                    Click for Directions
                </a>
            </div>

        </div>
    </main>

    <script>
        const weddingDate = new Date("Oct 18, 2026 11:30:00").getTime();
        
        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            document.getElementById("countdown").innerHTML = days + ":" + hours;
        }, 1000);
    </script>
</body>
</html>
