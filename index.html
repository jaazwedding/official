<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawad & Shabhistha's Wedding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=1,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="jaaz logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>
    
    <style>
        .playfair { font-family: 'Playfair Display', serif; }
        .montserrat { font-family: 'Montserrat', sans-serif; }
        .card-shadow { box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05); }

        /* Halo Glow Effect for the Image */
        .halo-effect {
            box-shadow: 0 0 40px 15px rgba(103, 151, 169, 0.3);
        }

        /* Prevent particles and videos from blocking interactions */
        video, #tsparticles-back, #tsparticles-over-image { 
            pointer-events: none; 
        }
    </style>
</head>
<body class="bg-[#d9e9f2] montserrat text-stone-700">

    <nav class="flex justify-center space-x-6 md:space-x-12 py-6 text-xs md:text-sm uppercase tracking-widest font-medium relative z-40">
        <a href="#" class="hover:text-rose-400">Our Story</a>
        <a href="#" class="border-b-2 border-stone-800 pb-1">Event</a>
        <a href="#" class="hover:text-rose-400">Location</a>
        <a href="#" class="hover:text-rose-400">Gallery</a>
        <a href="#" class="hover:text-rose-400">Contact</a>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        
        <div class="text-center mt-4 relative z-40">
            <h1 class="playfair text-4xl md:text-6xl italic font-semibold text-stone-800">Jawad & Shabhistha's</h1>
            <h2 class="playfair text-2xl md:text-3xl italic text-stone-700 mt-2">Wedding Invitation</h2>
        </div>

        <div class="relative flex justify-center items-center my-10 px-4 h-64 md:h-96">
            
            <img src="images/arch-left.png" class="absolute left-10 md:left-20 lg:left-40 h-full opacity-60 pointer-events-none hidden sm:block z-20" alt="">
            
            <div id="tsparticles-back" class="absolute inset-0 pointer-events-none z-15"></div>

            <div class="relative z-30 overflow-hidden rounded-[2rem] md:rounded-[4rem] h-full shadow-2xl halo-effect">
                <img src="main page poster.png" class="h-full w-auto object-cover" alt="Couple">
                
                <div id="tsparticles-over-image" class="absolute inset-0 pointer-events-none z-35"></div>
            </div>

            <img src="images/arch-right.png" class="absolute right-10 md:right-20 lg:right-40 h-full opacity-60 scale-x-[-1] pointer-events-none hidden sm:block z-20" alt="">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 relative z-40">
            </div>
    </main>

    <script>
        // Countdown Logic (existing code)
        const weddingDate = new Date("Oct 18, 2026 11:30:00").getTime();
        
        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "00:00";
            } else {
                document.getElementById("countdown").innerHTML = days + ":" + hours;
            }
        }, 1000);

        // --- Optimized tsParticles configuration for visual clarity ---
        window.onload = function() {
            
            // Defines the base shared properties for a "petal"
            const sharedPetalConfig = {
                scalar: 1.2,
                colors: ["#F9A8D4", "#FDF2F8", "#FECDD3"], // Soft pinks
                gravity: 0.12,  // Light, romantic descent
                drift: 0.3,     // Gentle side-to-side sway
                shapes: ["circle", "square"],
                ticks: 400      // Slow falling speed
            };

            // 1. Initial burst for both deep and front layers
            // Deep Layer (z-15)
            confetti({
                target: "tsparticles-back",
                particleCount: 15,
                spread: 100,
                origin: { y: -0.1 },
                zIndex: 15,
                ...sharedPetalConfig
            });
            // Front Layer (z-35)
            confetti({
                target: "tsparticles-over-image",
                particleCount: 5,
                spread: 40,     // Narrower spread for image focus
                origin: { y: -0.1, x: 0.5 }, // Centralized start
                zIndex: 35,
                ...sharedPetalConfig
            });
            
            // 2. Continuous Immersion Shower Loops
            // Loop for the Deep Layer (Keeps the scene active behind text)
            setInterval(() => {
                confetti({
                    target: "tsparticles-back",
                    particleCount: 3, // Minimal, constant activity
                    spread: 100,
                    origin: { y: -0.1 },
                    zIndex: 15,
                    ...sharedPetalConfig
                });
            }, 5000);

            // Loop for the Front Layer (Creates depth OVER the image)
            setInterval(() => {
                confetti({
                    target: "tsparticles-over-image",
                    particleCount: 2, // Very minimal to ensure visibility over the illustration
                    spread: 30,      
                    origin: { y: -0.1, x: 0.5 },
                    zIndex: 35,
                    gravity: 0.1,   // Even lighter gravity for the front layer
                    ...sharedPetalConfig
                });
            }, 6500); // Front petals fall less frequently
        };
    </script>
</body>
</html>
