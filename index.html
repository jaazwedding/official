<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawad & Shabistha's Wedding - Premiere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="jaaz logo (3).png">
    
    <style>
        .playfair { font-family: 'Playfair Display', serif; }
        .montserrat { font-family: 'Montserrat', sans-serif; }
        body { background-color: #2d241e; margin: 0; padding: 0; overflow: hidden; }

        /* --- WATERMARK --- */
        .watermark-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 600px; opacity: 0.04; pointer-events: none; z-index: 0;
        }

        /* --- PREMIERE SCREEN --- */
        #premiere-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: #2d241e;
            background-image: url("https://www.transparenttextures.com/patterns/black-linen.png");
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fdfbf7; text-align: center; padding: 20px;
            transition: opacity 2s ease, visibility 2s;
        }
        .premiere-frame {
            border: 2px solid #d4af37; padding: 3rem 2rem; border-radius: 4rem;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            max-width: 500px; width: 100%; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }
        .timer-box { font-size: 2.5rem; font-weight: bold; letter-spacing: 0.1em; color: #d4af37; text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }

        /* --- ENVELOPE & UNBOXING --- */
        #unboxing-container { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #2d241e; z-index: 200; }
        .envelope-wrapper { position: relative; width: 340px; height: 240px; background: #fdfbf7; border-radius: 30px; margin: 20px 0; }
        .envelope-flap { position: absolute; top: -2px; width: 100%; height: 140px; background: #f9f5f0; clip-path: ellipse(50% 100% at 50% 0%); transform-origin: top; transition: transform 0.9s ease; z-index: 30; }
        .flap-open { transform: rotateX(180deg); z-index: 10; }
        .luxury-seal { width: 80px; height: 80px; background: white; border: 3px solid #d4af37; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 45; }
        .luxury-seal img { width: 80%; }

        /* --- MAIN WRAPPER --- */
        #main-page-wrapper { position: fixed; inset: 15px; background: #fdfbf7; border-radius: 3.5rem; border: 3px solid #d4af37; z-index: 40; display: none; overflow: hidden; }
        #scroll-content { height: 100%; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; }
        
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBt-AS0ViQ_vMB8Mor-nx6x7enr7BZzmaU",
            authDomain: "wedding-card-f3460.firebaseapp.com",
            databaseURL: "https://wedding-card-f3460-default-rtdb.firebaseio.com",
            projectId: "wedding-card-f3460",
            storageBucket: "wedding-card-f3460.firebasestorage.app",
            messagingSenderId: "266632299451",
            appId: "1:266632299451:web:aad01460dc6ac057e8ba9e",
            measurementId: "G-0E0QNW263Y"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const maintenanceRef = ref(db, 'isMaintenance');

        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'true';

        // Premiere Date: May 12, 2026 12:00 PM
        const premiereDate = new Date("May 12, 2026 12:00:00").getTime();

        function updatePremiereTimer() {
            const now = new Date().getTime();
            const distance = premiereDate - now;

            if (distance < 0 && !isAdmin) {
                document.getElementById('premiere-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('premiere-screen').style.visibility = 'hidden';
                    document.getElementById('unboxing-container').style.display = 'flex';
                }, 2000);
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('premiere-timer').innerText = 
                `${d}d : ${h}h : ${m}m : ${s}s`;
        }

        // Run timer
        setInterval(updatePremiereTimer, 1000);

        if (isAdmin) {
            window.addEventListener('DOMContentLoaded', () => {
                document.getElementById('premiere-screen').style.display = 'none';
                document.getElementById('unboxing-container').style.display = 'flex';
                // Show maintenance panel if needed
            });
        }
    </script>
</head>
<body class="montserrat">

    <img src="jaaz logo (3).png" class="watermark-bg" alt="Watermark">

    <div id="premiere-screen">
        <div class="premiere-frame">
            <img src="jaaz logo (3).png" class="w-24 h-24 mx-auto mb-6 floating" alt="Logo">
            <p class="playfair italic text-xl text-stone-400 mb-2">A Royal Reveal Awaits</p>
            <h1 class="playfair text-3xl md:text-5xl font-bold mb-8">Grand Premiere</h1>
            
            <div id="premiere-timer" class="timer-box montserrat mb-8">00:00:00:00</div>
            
            <p class="text-[10px] uppercase tracking-[0.4em] text-stone-500 font-bold mb-4">Launching On</p>
            <p class="playfair text-2xl text-[#d4af37]">May 12, 2026 • 12:00 PM</p>
            
            <div class="h-px w-20 bg-[#d4af37]/30 mx-auto my-10"></div>
            <p class="text-xs italic text-stone-400">"Be ready to witness the beautiful journey of Jawad & Shabistha"</p>
        </div>
    </div>

    <div id="unboxing-container">
        <div id="envelope-main" class="envelope-wrapper mx-auto">
            <div id="flap" class="envelope-flap"></div>
            <div class="flex flex-col items-center justify-center h-full pt-10">
                <div class="luxury-seal" onclick="openInvitation()">
                    <img src="jaaz logo (3).png" alt="Seal">
                </div>
                <p class="montserrat text-[10px] font-bold uppercase text-[#d4af37] mt-4 tracking-widest">Open Invitation</p>
            </div>
        </div>
    </div>

    <div id="main-page-wrapper">
        <div id="scroll-content">
            <div class="p-10 text-center">
                <h1 class="playfair text-5xl md:text-7xl italic font-semibold text-stone-800 mb-6">Jawad & Shabistha</h1>
                <nav class="flex justify-center gap-6 text-[10px] font-bold uppercase tracking-widest border-b pb-4 max-w-xs mx-auto mb-10">
                    <a href="#" class="text-[#d4af37] border-b border-[#d4af37]">Event</a>
                    <a href="location.html">Location</a>
                    <a href="contact.html">Contact</a>
                    <a href="gallery.html">Gallery</a>
                </nav>
                <div class="max-w-md mx-auto">
                    <img src="main page poster.png" class="rounded-[3rem] shadow-2xl border-8 border-white">
                </div>
                </div>
        </div>
    </div>

    <script>
        function openInvitation() {
            document.getElementById('flap').classList.add('flap-open');
            const env = document.getElementById('envelope-main');
            env.style.transition = '1.5s ease-in-out';
            env.style.transform = 'scale(5)';
            env.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('unboxing-container').style.display = 'none';
                document.getElementById('main-page-wrapper').style.display = 'block';
            }, 800);
        }
    </script>
</body>
</html>
