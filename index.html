<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawad & Shabhistha's Wedding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="jaaz logo.png">
    
    <style>
        .playfair { font-family: 'Playfair Display', serif; }
        .montserrat { font-family: 'Montserrat', sans-serif; }
        .card-shadow { box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05); }

        .halo-effect {
            box-shadow: 0 0 50px 15px rgba(103, 151, 169, 0.25);
        }

        /* --- Rich CSS Flower Shower --- */
        .flower-container {
            position: absolute;
            width: 100%;
            height: 150%; /* Extended height for longer fall */
            top: -20%;
            left: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 20;
        }

        .petal {
            position: absolute;
            background-color: #ffb7c5; /* Rose Pink */
            border-radius: 150% 0 150% 0;
            opacity: 0;
            animation: shower 10s linear infinite;
        }

        @keyframes shower {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(120vh) rotate(720deg) translateX(50px); opacity: 0; }
        }

        /* Create a dense shower with 20 petals of different sizes, positions, and timings */
        .petal:nth-child(1) { left: 5%; width: 15px; height: 15px; animation-duration: 7s; animation-delay: 0s; }
        .petal:nth-child(2) { left: 15%; width: 10px; height: 10px; animation-duration: 12s; animation-delay: 2s; }
        .petal:nth-child(3) { left: 25%; width: 18px; height: 18px; animation-duration: 8s; animation-delay: 4s; }
        .petal:nth-child(4) { left: 35%; width: 12px; height: 12px; animation-duration: 11s; animation-delay: 1s; }
        .petal:nth-child(5) { left: 45%; width: 14px; height: 14px; animation-duration: 9s; animation-delay: 3s; }
        .petal:nth-child(6) { left: 55%; width: 11px; height: 11px; animation-duration: 13s; animation-delay: 5s; }
        .petal:nth-child(7) { left: 65%; width: 16px; height: 16px; animation-duration: 7s; animation-delay: 0.5s; }
        .petal:nth-child(8) { left: 75%; width: 13px; height: 13px; animation-duration: 10s; animation-delay: 2.5s; }
        .petal:nth-child(9) { left: 85%; width: 15px; height: 15px; animation-duration: 8s; animation-delay: 1.5s; }
        .petal:nth-child(10) { left: 95%; width: 10px; height: 10px; animation-duration: 12s; animation-delay: 4.5s; }
        .petal:nth-child(11) { left: 10%; width: 14px; height: 14px; animation-duration: 9s; animation-delay: 6s; }
        .petal:nth-child(12) { left: 20%; width: 17px; height: 17px; animation-duration: 11s; animation-delay: 0.2s; }
        .petal:nth-child(13) { left: 40%; width: 12px; height: 12px; animation-duration: 8.5s; animation-delay: 3.5s; }
        .petal:nth-child(14) { left: 60%; width: 15px; height: 15px; animation-duration: 10.5s; animation-delay: 1.2s; }
        .petal:nth-child(15) { left: 80%; width: 13px; height: 13px; animation-duration: 7.5s; animation-delay: 5.5s; }
        .petal:nth-child(16) { left: 30%; width: 16px; height: 16px; animation-duration: 9.5s; animation-delay: 2.2s; }
        .petal:nth-child(17) { left: 50%; width: 11px; height: 11px; animation-duration: 12.5s; animation-delay: 0.8s; }
        .petal:nth-child(18) { left: 70%; width: 18px; height: 18px; animation-duration: 8.2s; animation-delay: 4.8s; }
        .petal:nth-child(19) { left: 90%; width: 14px; height: 14px; animation-duration: 10s; animation-delay: 3.2s; }
        .petal:nth-child(20) { left: 12%; width: 12px; height: 12px; animation-duration: 11.5s; animation-delay: 1.8s; }
    </style>
</head>
<body class="bg-[#d9e9f2] montserrat text-stone-700">

    <nav class="flex justify-center space-x-6 md:space-x-12 py-6 text-xs md:text-sm uppercase tracking-widest font-medium relative z-50">
        <a href="#" class="hover:text-rose-400">Our Story</a>
        <a href="#" class="border-b-2 border-stone-800 pb-1">Event</a>
        <a href="#" class="hover:text-rose-400">Location</a>
        <a href="#" class="hover:text-rose-400">Gallery</a>
        <a href="#" class="hover:text-rose-400">Contact</a>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        
        <div class="text-center mt-4 relative z-50">
            <h1 class="playfair text-4xl md:text-6xl italic font-semibold text-stone-800">Jawad & Shabhistha's</h1>
            <h2 class="playfair text-2xl md:text-3xl italic text-stone-700 mt-2">Wedding Invitation</h2>
        </div>

        <div class="relative flex justify-center items-center my-10 px-4 h-64 md:h-96">
            
            <img src="images/arch-left.png" class="absolute left-10 md:left-20 lg:left-40 h-full opacity-60 pointer-events-none hidden sm:block z-10" alt="">
            
            <div class="flower-container">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
            </div>

            <div class="relative z-30 overflow-hidden rounded-[2rem] md:rounded-[4rem] h-full shadow-2xl halo-effect">
                <img src="main page poster.png" class="h-full w-auto object-cover" alt="Couple">
            </div>

            <img src="images/arch-right.png" class="absolute right-10 md:right-20 lg:right-40 h-full opacity-60 scale-x-[-1] pointer-events-none hidden sm:block z-10" alt="">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 relative z-50">
            
            <div class="bg-white rounded-[2rem] p-8 text-center border border-stone-100 card-shadow">
                <h3 class="font-semibold text-lg mb-4">The Big Day</h3>
                <div id="countdown" class="text-5xl font-bold text-rose-300">00:00</div>
                <p class="text-xs text-stone-400 mt-1 uppercase tracking-tighter">Days : Hours</p>
                <div class="flex items-center justify-center mt-6 text-sm">
                    <span>📅 October 18, 2026</span>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] p-8 text-center border border-stone-100 card-shadow">
                <div class="text-4xl mb-3">🕌</div>
                <h3 class="font-semibold text-lg">Nikah Ceremony</h3>
                <p class="text-sm text-stone-500 mt-2">Timing: 11:30 AM</p>
            </div>

            <div class="bg-white rounded-[2rem] p-8 text-center border border-stone-100 card-shadow">
                <div class="text-4xl mb-3">🎂</div>
                <h3 class="font-semibold text-lg">Reception</h3>
                <p class="text-sm text-stone-500 mt-2">Timing: 7:00 PM onwards</p>
            </div>

            <div class="md:col-span-1 bg-white rounded-[2rem] overflow-hidden border border-stone-100 card-shadow">
                <div class="p-6">
                    <h3 class="font-semibold text-lg">The Venue</h3>
                    <p class="text-sm font-medium mt-2">The Emerald Garden</p>
                    <p class="text-xs text-stone-400">123 Wedding Street, City</p>
                </div>
                <a href="#" target="_blank" class="block bg-stone-900 text-white text-center py-3 text-xs font-bold uppercase tracking-widest hover:bg-stone-700 transition">
                    Click for Directions
                </a>
            </div>
        </div>
    </main>

    <script>
        const weddingDate = new Date("Oct 18, 2026 11:30:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("countdown").innerHTML = distance < 0 ? "00:00" : days + ":" + hours;
        }, 1000);
    </script>
</body>
</html>
